<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SID 2026 Paper Summaries</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0c10;
            --sidebar-bg: rgba(17, 20, 24, 0.8);
            --card-bg: rgba(22, 27, 34, 0.7);
            --accent-primary: #3b82f6;
            --accent-secondary: #8b5cf6;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --glass-border: rgba(255, 255, 255, 0.1);
            --gradient-main: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styling */
        #sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 2rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .sidebar-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .sidebar-header p {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .file-list::-webkit-scrollbar {
            width: 5px;
        }

        .file-list::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .file-item {
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--glass-border);
        }

        .file-item.active {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            color: var(--accent-primary);
        }

        .file-item i {
            width: 18px;
            height: 18px;
        }

        /* Main Content Styling */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .top-bar {
            padding: 1.25rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 12, 16, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.6rem 1.25rem;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: var(--gradient-main);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        #content-area {
            flex: 1;
            overflow-y: auto;
            padding: 2.5rem;
            display: flex;
            justify-content: center;
        }

        .content-card {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Markdown Rendering Styles */
        .prose h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }

        .prose h3 {
            color: var(--accent-primary);
            margin-top: 2rem;
            margin-bottom: 0.75rem;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .prose p, .prose li {
            line-height: 1.7;
            color: var(--text-main);
            margin-bottom: 1rem;
            font-size: 1.05rem;
        }

        .prose ul {
            margin-left: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .prose strong {
            color: var(--accent-secondary);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
        }

        .empty-state i {
            width: 64px;
            height: 64px;
            margin-bottom: 1.5rem;
            opacity: 0.5;
        }

        /* Toast Notification */
        #toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #10b981;
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            display: none;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">
            <h1>SID 2026</h1>
            <p>Research Paper Summaries</p>
        </div>
        <div class="file-list" id="file-list">
            <!-- Files will be injected here -->
        </div>
    </div>

    <div id="main-content">
        <div class="top-bar">
            <div id="current-filename" style="font-weight: 600; color: var(--text-dim);">Select a paper</div>
            <div class="actions">
                <button class="btn btn-secondary" onclick="copyForPPT()">
                    <i data-lucide="copy"></i> Copy for PPT
                </button>
            </div>
        </div>
        <div id="content-area">
            <div class="empty-state">
                <i data-lucide="file-text"></i>
                <p>Please select a file from the sidebar to view the summary.</p>
            </div>
        </div>
    </div>

    <div id="toast">Copied to clipboard!</div>

    <script>
        const files = [
            '13-1.md', '13-2.md', '13-3.md', '13-4.md',
            '20-1.md', '20-2.md', '20-3.md', '20-4.md',
            '44-1.md', '44-2.md', '44-3.md', '44-4.md',
            '56-1.md', '56-2.md', '56-4.md',
            '72-1.md', '72-2.md',
            '74-3.md',
            '91-1.md', '91-2.md', '91-3.md', '91-4.md',
            '98-1.md', '98-2.md'
        ];

        let currentContent = '';

        function init() {
            const listContainer = document.getElementById('file-list');
            files.forEach(file => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `<i data-lucide="file"></i> ${file}`;
                item.onclick = () => loadFile(file, item);
                listContainer.appendChild(item);
            });
            lucide.createIcons();
        }

        async function loadFile(filename, element) {
            // UI Updates
            document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('current-filename').innerText = filename;

            try {
                const response = await fetch(filename);
                if (!response.ok) throw new Error('File not found');
                const text = await response.textContent ? await response.text() : '';
                currentContent = text;
                
                const contentArea = document.getElementById('content-area');
                contentArea.innerHTML = `
                    <div class="content-card prose">
                        ${marked.parse(text)}
                    </div>
                `;
            } catch (err) {
                console.error(err);
                document.getElementById('content-area').innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="alert-circle"></i>
                        <p>Error loading file: ${filename}</p>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        function copyForPPT() {
            if (!currentContent) return;

            // Format for PPT: Remove # and ###, simplify structure
            const lines = currentContent.split('\n');
            let formatted = '';
            
            lines.forEach(line => {
                let trimmed = line.trim();
                if (trimmed.startsWith('#')) {
                    formatted += trimmed.replace(/#+\s*/, '') + '\n';
                } else if (trimmed.startsWith('-')) {
                    formatted += trimmed + '\n';
                } else if (trimmed) {
                    formatted += trimmed + '\n';
                }
                if (!trimmed) formatted += '\n';
            });

            navigator.clipboard.writeText(formatted).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => {
                    toast.style.display = 'none';
                }, 2000);
            });
        }

        init();
    </script>
</body>
</html>
